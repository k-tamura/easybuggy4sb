msg.note.vulnerabileoidcrp1       = You can perform a user enumeration attack on the self-registration screen using the following steps. The self-registration screen is displayed by clicking the "Register" link at the bottom of the login screen, which appears after clicking the login link. <br /><br />\<ol><li><code>Enter the attacker's application (container) with docker exec -it attacker-app bash</code>. </li><li><code>Execute jmeter -n -t user-enumeration-attack.jmx</code>. </li></ol> This will display a message like "<code>Username 'admin' already exists.</code>" in <code>jmeter.log</code>, allowing you to identify the username of an existing user. Additionally, a large number of users will be registered in Keycloak, consuming a large amount of Keycloak server resources.
msg.note.vulnerabileoidcrp2       = You can perform a dictionary attack on the login screen using the following steps. <br /><br />\<ol><li><code>Enter the attacker's application (container) with docker exec -it attacker-app bash</code>. </li><li><code>Execute jmeter -n -t dictionary-attack.jmx -Jusername=admin</code>. </li></ol>This will allow you to identify the password for the user with username <code>admin</code>.
msg.note.vulnerabileoidcrp3       = You can perform a brute-force attack on the login screen using the following steps: <br /><br />\<ol><li><code>Enter the attacker's application (container) with docker exec -it attacker-app bash</code>. </li><li><code>Execute jmeter -n -t brute-force-attack.jmx -Jusername=test</code>. </li></ol>This will display a message similar to the following in <code>jmeter.log</code>, allowing you to identify the password for the user with username <code>test</code>. <br/><br/><pre>2025-08-29 05:29:05,742 INFO o.a.j.p.j.s.J.JSR223 Sampler: Username: test<br/>2025-08-29 05:29:05,742 INFO o.a.j.p.j.s.J.JSR223 Sampler: Password: 123</pre>
msg.note.vulnerabileoidcrp4       = You can perform a Joe account attack on the login screen using the following steps: <br /><br />\<ol><li><code>Enter the attacker's application (container) with docker exec -it attacker-app bash</code>. </li><li><code>Execute jmeter -n -t joe-account-attack.jmx</code>. This will display a message similar to the following in <code>jmeter.log</code>, allowing you to identify users with the same username and password: <br/><br/><pre>2025-08-29 06:10:34,676 INFO o.a.j.p.j.s.J.JSR223 Sampler: Login success!<br/>2025-08-29 06:10:34,681 INFO o.a.j.p.j.s.J.JSR223 Sampler: Username: user<br/>2025-08-29 06:10:34,681 INFO o.a.j.p.j.s.J.JSR223 Sampler: Password: user</pre>
msg.note.vulnerabileoidcrp5       = You can perform a brute-force attack on the login screen using the following steps: <br /><br />\<ol><li><code>Enter the attacker's application (container) with docker exec -it attacker-app bash</code>. </li><li><code>Execute jmeter -n -t reverse-brute-force-attack.jmx -Jpassword=password</code>. </li></ol>This will display a message similar to the following in <code>jmeter.log</code>, allowing you to identify the username of the user whose password is <code>password</code>. <br/><br/><pre>2025-08-29 05:29:05,742 INFO o.a.j.p.j.s.J.JSR223 Sampler: Username: 123<br/>2025-08-29 05:29:05,742 INFO o.a.j.p.j.s.J.JSR223 Sampler: Password: password</pre>
msg.note.vulnerabileoidcrp6       = You can perform a password list attack on the login screen using the following steps: <br /><br />\<ol><li><code>Enter the attacker's application (container) with docker exec -it attacker-app bash</code>. </li><li><code>Execute jmeter -n -t password-list-attack.jmx</code>. This will display a message similar to the following in <code>jmeter.log</code>, allowing you to identify the username and password of the user who can log in: <br/><br/><pre>2025-08-29 06:10:34,676 INFO o.a.j.p.j.s.J.JSR223 Sampler: Login success!<br/>2025-08-29 06:10:34,681 INFO o.a.j.p.j.s.J.JSR223 Sampler: Username: manager<br/>2025-08-29 06:10:34,681 INFO o.a.j.p.j.s.J.JSR223 Sampler: Password: admin</pre>
msg.note.vulnerabileoidcrp7       = Click the login link and copy the URL of the login screen that appears. Change the value of the query parameter <code>redirect_uri</code> in that URL to <code>{0}</code> and post it on the bulletin board along with a message to lure the victim. When the victim accesses this URL, they will be redirected to the attacker's site, where their ID and password can be stolen. The attacker's site can be logged into using <code>docker exec -it attacker-app bash</code>, and the stolen ID and password will be output to <code>tomcat/logs/credential.txt</code>.
msg.note.vulnerabileoidcrp8       = An attacker can obtain an authorization code by following these steps: <br /><ol><li>Open a browser in a separate session to act as the attacker. </li><li>Access this screen and click the login link. </li><li>Click the "Register" link on the displayed login screen to create an attacker user. Enter <code>{0}</code> in the Picture field. </li><li>After creation, log out. </li><li>Return to this screen and click the login link.</li><li>Copy the URL of the login screen that appears, change the value of the query parameter <code>redirect_uri</code> to <code>{1}</code>, and save it.</li><li>Log in with the attacker account and post the saved URL to the bulletin board along with a message to guide the victim.</li><li>When the victim accesses this URL, the authorization code flow will be interrupted, and a request containing the authorization code in <code>referer</code> will be sent to the attacker's site. The attacker's site can be logged in with <code>docker exec -it attacker-app bash</code>. The URL containing the authorization code will be output to <code>tomcat/logs/localhost_access_log.txt</code>.</li></ol>
msg.note.vulnerabileoidcrp9       = An attacker can log in by impersonating a victim user using the following steps: <br/><ol><li>Once you have confirmed that the victim's authorization code is output in the referrer column of the access log on the attacker's site, perform the following steps within one minute. <br/>* To leak the victim's authorization code, please follow the steps on the page accessed by clicking "Authorization Code Leak" on the main page. </li><li><code>Access {0}</code>. </li><li>Temporarily change your browser settings to stop the authentication response redirect. In the case of Firefox, you can stop the redirect by entering <code>about:config</code> in the browser's URL bar and changing <code>network.http.redirection-limit</code> to <code>0</code>. </li><li>Click the F12 key to display the "Network" tab in developer mode and log in with the attacker's account. </li><li>The login will fail because you have stopped the redirect, but ignore it. Retrieve the value (URL) of the <code>Location</code> header included in the authentication response. Change <code>network.http.redirection-limit</code> back to <code>20</code>. Replace the path of the retrieved value (URL) from <code>/vulnerabileoidcrp</code> to <code>/callback</code>, and the value of the query parameter <code>code</code> with the victim's authorization code obtained earlier, then access that URL. </li></ol>
msg.note.vulnerabileoidcrp10      = An attacker can get a victim to log in as the attacker by following these steps: <br /><ol><li>Click the login link to display the login screen. </li><li>Temporarily change the browser settings to stop the redirection of the authentication response. In the case of Firefox, you can stop the redirection by typing <code>about:config</code> into the browser's URL bar and changing <code>network.http.redirection-limit</code> to <code>0</code>. </li><li>Click the F12 key to display the "Network" tab in developer mode and log in. </li><li>Copy the URL in the <code>Location</code> header of the response. </li><li>Log in with the attacker account. </li><li>Post that URL on a message board along with a message that lures the victim in. </li></ol>This will cause the victim to unintentionally log in with the attacker's account (i.e., be "impersonated" by the attacker). If the victim registers their sensitive information without realizing this, the attacker can obtain it.
msg.note.vulnerabileoidcrp11      = Even if the client's "Valid Redirect URIs" value is set to `<code>{0}</code>` in the Keycloak management console, it is possible to bypass the verification of the redirect URL and redirect to `<code>{1}</code>`, thereby leaking the authorization code. The procedure is as follows: <br /><ol><li>Open a browser in a separate session to act as an attacker. </li><li>Click the login link and create an attacker user. Enter `<code>{2}</code>` in the Picture field. </li><li>After creation, log out. </li><li>Return to this screen, click the login link, and change the value of the query parameter <code>redirect_uri</code> in the displayed URL to <code>{3}</code>, and record it. </li><li>Log in with the attacker account and post a message on the bulletin board that will guide the victim. </li><li>When the victim accesses this URL, the authorization code flow will be interrupted, and a request containing the authorization code in <code>referer</code> will be sent to the attacker's site. The attacker's site can be logged in with <code>docker exec -it attacker-app bash</code>. The URL containing the authorization code will be output to <code>tomcat/logs/localhost_access_log.txt</code>. </li></ol>
msg.note.vulnerabileoidcrp12      = Click the login link and enter <code>user/user</code> for username/password to log in as a regular user. While you can attach files along with comments on the bulletin board, changing the value of the query parameter <code>id</code> in the URL of that file to <code>1</code> will allow you to download a file containing confidential information intended for administrators.
